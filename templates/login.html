<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - ServiceDesk AVP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
    }
    .login-card h2 {
      margin-bottom: 20px;
      color: #2a5298;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="https://raw.githubusercontent.com/Lidermal/munual-avp/main/img/logo-avp.png" alt="AVP Conecta" class="mb-3 mx-auto d-block" height="60">
    <h2>ServiceDesk AVP</h2>
    {% if erro %}
      <div class="alert alert-danger">{{ erro }}</div>
    {% endif %}
    <form method="POST">
      <div class="mb-3">
        <label>Email</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label>Senha</label>
        <input type="password" name="senha" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
    </form>
    <div class="mt-3 text-center">
      <a href="/primeiro-acesso?email=" class="text-muted">Primeiro acesso? Crie sua senha</a>
    </div>
  </div>
</body>
</html>
