<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Usuários - ServiceDesk AVP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
  <h2>Gerenciamento de Usuários</h2>
  <a href="{{ url_for('dashboard') }}" class="btn btn-secondary mb-3">Voltar</a>

  <table class="table table-striped">
    <thead>
      <tr>
        <th>Matrícula</th>
        <th>Nome</th>
        <th>Email</th>
        <th>Perfil</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="usuarios-table"></tbody>
  </table>

  <script>
    async function carregarUsuarios() {
      const res = await fetch("/api/usuarios");
      const usuarios = await res.json();
      const tbody = document.getElementById("usuarios-table");
      tbody.innerHTML = "";
      usuarios.forEach(u => {
        tbody.innerHTML += `
          <tr>
            <td>${u.matricula}</td>
            <td>${u.nome}</td>
            <td>${u.email}</td>
            <td>${u.perfil}</td>
            <td>${u.status}</td>
          </tr>
        `;
      });
    }
    carregarUsuarios();
  </script>
</body>
</html>
