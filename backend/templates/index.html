<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Início - ServiceDesk AVP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
  {% include 'navbar.html' %}
  <div class="container mt-4">
    <img src="https://raw.githubusercontent.com/Lidermal/munual-avp/main/img/banner-avp.png" class="img-fluid mb-4" alt="Banner AVP">
    <div class="row">
      <div class="col-md-4">
        <div class="card text-center">
          <div class="card-body">
            <h5 class="card-title">Usuários</h5>
            <p class="card-text">Gerencie os usuários cadastrados.</p>
            <a href="{{ url_for('usuarios_page') }}" class="btn btn-primary">Acessar</a>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-center">
          <div class="card-body">
            <h5 class="card-title">Chamados</h5>
            <p class="card-text">Acompanhe e abra novos chamados.</p>
            <a href="{{ url_for('chamados_page') }}" class="btn btn-success">Acessar</a>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card text-center">
          <div class="card-body">
            <h5 class="card-title">Histórico</h5>
            <p class="card-text">Veja o histórico de ações realizadas.</p>
            <a href="{{ url_for('listar_historico') }}" class="btn btn-secondary">Acessar</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
