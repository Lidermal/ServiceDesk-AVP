<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Primeiro Acesso - ServiceDesk AVP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="card mx-auto" style="max-width: 500px;">
      <div class="card-body">
        <img src="https://raw.githubusercontent.com/Lidermal/munual-avp/main/img/logo-avp.png" alt="AVP Conecta" class="mb-3 mx-auto d-block" height="60">
        <h3 class="text-center mb-4">Primeiro Acesso</h3>
        {% if erro %}
          <div class="alert alert-danger">{{ erro }}</div>
        {% endif %}
        <form method="POST">
          <div class="mb-3">
            <label>Defina sua senha</label>
            <input type="password" name="senha" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-success w-100">Salvar senha</button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
