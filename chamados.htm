<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Chamados - ServiceDesk AVP</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
  <h2>Lista de Chamados</h2>
  <a href="{{ url_for('dashboard') }}" class="btn btn-secondary mb-3">Voltar</a>

  <table class="table table-bordered">
    <thead>
      <tr>
        <th>ID</th>
        <th>Título</th>
        <th>Descrição</th>
        <th>Status</th>
        <th>Prioridade</th>
        <th>Usuário</th>
        <th>Criado em</th>
      </tr>
    </thead>
    <tbody id="chamados-table"></tbody>
  </table>

  <script>
    async function carregarChamados() {
      const res = await fetch("/api/chamados");
      const chamados = await res.json();
      const tbody = document.getElementById("chamados-table");
      tbody.innerHTML = "";
      chamados.forEach(c => {
        tbody.innerHTML += `
          <tr>
            <td>${c.id}</td>
            <td>${c.titulo}</td>
            <td>${c.descricao}</td>
            <td>${c.status}</td>
            <td>${c.prioridade}</td>
            <td>${c.usuario_matricula}</td>
            <td>${c.criado_em}</td>
          </tr>
        `;
      });
    }
    carregarChamados();
  </script>
</body>
</html>
